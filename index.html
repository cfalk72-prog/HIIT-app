<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HIIT Timer</title>
<style>
body{font-family:Arial;background:#111;color:white;text-align:center;margin:0;}
h1{margin-top:10px;}
#timer{font-size:90px;margin:20px;}
#segmentLabel{font-size:44px;font-weight:bold;margin-bottom:10px;}
button{font-size:16px;padding:8px 14px;margin:4px;border:none;border-radius:6px;}
.start{background:#2ecc71;color:white}
.stop{background:#e74c3c;color:white}
.add{background:#3498db;color:white}
.segment{display:flex;justify-content:space-between;align-items:center;background:#222;margin:6px;padding:10px;border-radius:6px;}
.segmentName{cursor:pointer;}
.controls button{font-size:14px;padding:6px 8px;}
#volumeControl{margin-top:10px;}
select{font-size:18px;padding:6px;margin-top:10px;}
</style>
</head>
<body>

<h1>HIIT Timer</h1>
<div id="segmentLabel">Ready</div>
<div id="timer">00:00</div>

<button class="start" onclick="startTimer()">Start</button>
<button class="stop" onclick="stopTimer()">Stop</button>
<button class="add" onclick="addSegment()">Add Segment</button>

<br>
<div id="volumeControl">
Beep Volume<br>
<input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.5">
</div>

<br>
<button onclick="newProgram()">New Program</button>

<br><br>
<select id="programSelect"></select>
<br>
<button onclick="saveProgram()">Save Program</button>
<button onclick="loadProgram()">Load Program</button>

<div id="segments"></div>

<script>
let segments=[],currentSegment=0,timeRemaining=0,timerInterval=null;
let audioCtx=null,beepVolume=0.5;

document.getElementById("volumeSlider").addEventListener("input", e=>{
    beepVolume=parseFloat(e.target.value);
});

// Play beep using Web Audio API
function playBeep(freq=1400,duration=120){
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = "square";
    gain.gain.setValueAtTime(beepVolume,audioCtx.currentTime);
    osc.start();
    osc.stop(audioCtx.currentTime + duration/1000);
}

function playTripleBeep(){
    playBeep(600);
    setTimeout(()=>playBeep(600),150);
    setTimeout(()=>playBeep(600),300);
}

// Start timer, unlock audio on iPhone
function startTimer(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state==="suspended") audioCtx.resume();
    if(segments.length===0) return;
    currentSegment=0;
    runSegment();
}

// Accurate timer using system time
function runSegment(){
    let seg = segments[currentSegment];
    const startTime = Date.now();
    const endTime = startTime + seg.time * 1000;
    const label = document.getElementById("segmentLabel");
    label.innerText = seg.name;
    let name = seg.name.toLowerCase();
    label.style.fontWeight="bold";
    label.style.fontSize="44px";
    label.style.color = name.includes("run") ? "red" : (name.includes("walk") ? "limegreen" : "white");

    function tick(){
        let now = Date.now();
        timeRemaining = Math.max(0, Math.ceil((endTime - now)/1000));
        updateDisplay();

        if(timeRemaining===3 && !tick.count3){ playBeep(); tick.count3=true; }
        if(timeRemaining===2 && !tick.count2){ playBeep(); tick.count2=true; }
        if(timeRemaining===1 && !tick.count1){ playBeep(); tick.count1=true; }

        if(timeRemaining<=0){
            playTripleBeep();
            clearInterval(timerInterval);
            currentSegment++;
            if(currentSegment < segments.length){ setTimeout(runSegment, 400); }
            else { label.innerText="Finished"; label.style.color="white"; }
        }
    }
    tick.count3 = tick.count2 = tick.count1 = false;
    timerInterval = setInterval(tick, 100);
}

function stopTimer(){ clearInterval(timerInterval); }

function updateDisplay(){
    let m=Math.floor(timeRemaining/60);
    let s=timeRemaining%60;
    document.getElementById("timer").innerText=
        String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function addSegment(){
    let name=prompt("Segment name");
    if(!name) return;
    let seconds=parseInt(prompt("Seconds"));
    segments.push({name:name,time:seconds});
    renderSegments();
}

function editSegment(i){
    let newName=prompt("Segment name",segments[i].name);
    if(newName===null) return;
    let newTime=parseInt(prompt("Seconds",segments[i].time));
    if(newTime===null) return;
    segments[i]={name:newName,time:newTime};
    renderSegments();
}

function deleteSegment(i){
    if(!confirm("Delete segment?")) return;
    segments.splice(i,1);
    renderSegments();
}

function moveUp(i){
    if(i===0) return;
    let temp=segments[i];
    segments[i]=segments[i-1];
    segments[i-1]=temp;
    renderSegments();
}

function moveDown(i){
    if(i===segments.length-1) return;
    let temp=segments[i];
    segments[i]=segments[i+1];
    segments[i+1]=temp;
    renderSegments();
}

function renderSegments(){
    let list=document.getElementById("segments");
    list.innerHTML="";
    segments.forEach((seg,i)=>{
        let div=document.createElement("div");
        div.className="segment";
        div.innerHTML=`
        <div class="segmentName" onclick="editSegment(${i})">
        <b>${seg.name}</b> - ${seg.time}s
        </div>
        <div class="controls">
        <button onclick="moveUp(${i})">⬆</button>
        <button onclick="moveDown(${i})">⬇</button>
        <button onclick="deleteSegment(${i})">Delete</button>
        </div>`;
        list.appendChild(div);
    });
}

function newProgram(){
    if(confirm("Start a new program? This will clear current segments.")){
        segments=[];
        renderSegments();
        document.getElementById("segmentLabel").innerText="Ready";
        document.getElementById("timer").innerText="00:00";
    }
}

function saveProgram(){
    let name=prompt("Enter a name for this program");
    if(!name) return;
    let programs=JSON.parse(localStorage.getItem("hiitPrograms")||"{}");
    programs[name]=segments;
    localStorage.setItem("hiitPrograms",JSON.stringify(programs));
    refreshProgramDropdown();
    alert("Program saved as \"" + name + "\"");
}

function loadProgram(){
    let name=document.getElementById("programSelect").value;
    if(!name) return;
    let programs=JSON.parse(localStorage.getItem("hiitPrograms")||"{}");
    segments=programs[name]||[];
    renderSegments();
}

function refreshProgramDropdown(){
    let programs=JSON.parse(localStorage.getItem("hiitPrograms")||"{}");
    let select=document.getElementById("programSelect");
    select.innerHTML="";
    Object.keys(programs).forEach(name=>{
        let option=document.createElement("option");
        option.value=name;
        option.textContent=name;
        select.appendChild(option);
    });
}

refreshProgramDropdown();
</script>
</body>
</html>
