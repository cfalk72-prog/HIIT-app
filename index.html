<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIIT iPhone Stable</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body { background:black; color:white; font-family:-apple-system; text-align:center; padding:20px; }
#segmentLabel { font-size:30px; margin-top:20px; }
#display { font-size:90px; margin:10px 0 20px 0; }
.timer-row { background:#111; padding:10px; margin:6px 0; border-radius:10px; display:flex; gap:6px; }
.timer-row input { flex:1; padding:6px; font-size:16px; }
.timer-row button { background:#a00; color:white; border:none; border-radius:6px; }
button { background:#1c1c1e; color:white; border:none; padding:8px 14px; border-radius:10px; margin:4px; }
</style>
</head>
<body>

<h2>HIIT</h2>

<div id="timerContainer"></div>
<button onclick="addTimer()">Add Segment</button>

<hr>

<div id="segmentLabel"></div>
<div id="display">00:00</div>

<button id="startBtn">Start</button>
<button onclick="pauseTimer()">Pause</button>

<script>

let timers = [];
let currentIndex = 0;
let remaining = 0;
let interval = null;
let paused = false;
let audioCtx = null;

// ---------- AUDIO (iOS SAFE) ----------
function unlockAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    audioCtx.resume(); // CRITICAL for iOS
}

function beep(freq, duration=150) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.type = "sine";
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration/1000);
}

// ---------- TIMER UI ----------
function addTimer(label="", seconds="") {
    const div = document.createElement("div");
    div.className = "timer-row";
    div.innerHTML = `
        <input placeholder="Run / Walk" value="${label}">
        <input type="number" placeholder="Seconds" value="${seconds}">
        <button onclick="deleteTimer(this)">Delete</button>
    `;
    document.getElementById("timerContainer").appendChild(div);
}

function deleteTimer(btn) {
    if (confirm("Delete this segment?")) {
        btn.parentElement.remove();
    }
}

// ---------- DRAG ----------
new Sortable(document.getElementById("timerContainer"), {
    animation:150
});

// ---------- TIMER LOGIC ----------
function startTimer() {

    unlockAudio(); // must happen inside tap

    timers = [];
    document.querySelectorAll(".timer-row").forEach(row=>{
        const label = row.children[0].value.trim();
        const seconds = parseInt(row.children[1].value);
        if (!isNaN(seconds) && seconds > 0) {
            timers.push({label, seconds});
        }
    });

    if (!timers.length) return;

    if (!paused) {
        currentIndex = 0;
        remaining = timers[0].seconds;
    }

    paused = false;
    runTimer();
}

function pauseTimer() {
    paused = true;
    clearInterval(interval);
}

function runTimer() {

    if (currentIndex >= timers.length) return;

    const label = timers[currentIndex].label.toLowerCase();
    const labelDiv = document.getElementById("segmentLabel");
    const displayDiv = document.getElementById("display");

    labelDiv.textContent = timers[currentIndex].label;

    function applyColor() {
        if (label.includes("run")) {
            labelDiv.style.color = "red";
            displayDiv.style.color = "red";
        } else if (label.includes("walk")) {
            labelDiv.style.color = "lime";
            displayDiv.style.color = "lime";
        } else {
            labelDiv.style.color = "white";
            displayDiv.style.color = "white";
        }
    }

    applyColor();
    updateDisplay();

    clearInterval(interval);

    interval = setInterval(() => {

        if (paused) return;

        remaining--;
        updateDisplay();

        // ONLY 3,2,1 beeps
        if (remaining === 3 || remaining === 2 || remaining === 1) {
            beep(900,120);
        }

        if (remaining === 0) {

            beep(200,400);

            if (navigator.vibrate) {
                navigator.vibrate([200,100,200]);
            }

            clearInterval(interval);
            currentIndex++;

            if (currentIndex < timers.length) {
                remaining = timers[currentIndex].seconds;
                setTimeout(runTimer,1000);
            }
        }

    },1000);
}

function updateDisplay() {
    const m = Math.floor(remaining/60);
    const s = remaining%60;
    document.getElementById("display").textContent =
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// Attach start inside user gesture
document.getElementById("startBtn").addEventListener("click", startTimer);

</script>
</body>
</html>
