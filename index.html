<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIIT Timer</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont;
    background:#000;
    color:white;
    margin:0;
    padding:20px;
    text-align:center;
}

h1{
    font-size:22px;
    margin-bottom:10px;
}

#display{
    font-size:64px;
    font-weight:bold;
    margin:20px 0;
}

#segmentLabel{
    font-size:22px;
    margin-bottom:15px;
}

button{
    font-size:18px;
    padding:12px 20px;
    margin:6px;
    border:none;
    border-radius:12px;
}

.start{background:#007aff;color:white;}
.pause{background:#ff9500;color:white;}
.add{background:#34c759;color:white;}

.timer-row{
    display:flex;
    align-items:center;
    gap:8px;
    background:#111;
    padding:10px;
    border-radius:12px;
    margin:6px 0;
    touch-action:pan-y;
}

.timer-row input{
    font-size:16px;
    padding:6px;
    border-radius:8px;
    border:none;
}

.drag-handle{
    font-size:20px;
    cursor:grab;
}

.delete{
    background:red;
    color:white;
    padding:6px 10px;
    border-radius:8px;
}
</style>
</head>

<body>

<h1>HIIT Timer</h1>

<div id="segmentLabel">Ready</div>
<div id="display">00:00</div>

<button class="start" onclick="startTimer()">Start</button>
<button class="pause" onclick="pauseTimer()">Pause</button>
<button class="add" onclick="addTimer()">Add Segment</button>

<div id="timers"></div>

<script>

let timers=[];
let currentIndex=0;
let remaining=0;
let interval=null;
let paused=false;
let audioCtx=null;

// -------- AUDIO --------
function unlockAudio(){
    if(!audioCtx){
        audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    }
    if(audioCtx.state==="suspended"){
        audioCtx.resume();
    }
}

function beep(freq,duration=150){
    if(!audioCtx)return;
    if(audioCtx.state==="suspended"){
        audioCtx.resume();
    }

    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();

    osc.frequency.value=freq;
    osc.type="sine";
    gain.gain.value=0.6;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime+duration/1000);
}

// -------- SEGMENTS --------
function addTimer(label="",seconds=30){
    const row=document.createElement("div");
    row.className="timer-row";
    row.draggable=true;

    row.innerHTML=`
        <div class="drag-handle">☰</div>
        <input type="text" placeholder="Run or Walk" value="${label}">
        <input type="number" min="1" value="${seconds}" style="width:70px">
        <button class="delete">X</button>
    `;

    // Swipe to delete
    let startX=0;
    row.addEventListener("touchstart",e=>{
        startX=e.touches[0].clientX;
    });

    row.addEventListener("touchend",e=>{
        let endX=e.changedTouches[0].clientX;
        if(startX-endX>80){
            if(confirm("Delete this segment?")){
                row.remove();
            }
        }
    });

    // Delete button
    row.querySelector(".delete").onclick=()=>{
        if(confirm("Delete this segment?")){
            row.remove();
        }
    };

    // Drag reorder
    row.addEventListener("dragstart",()=>row.classList.add("dragging"));
    row.addEventListener("dragend",()=>row.classList.remove("dragging"));

    document.getElementById("timers").appendChild(row);
}

document.getElementById("timers").addEventListener("dragover",e=>{
    e.preventDefault();
    const dragging=document.querySelector(".dragging");
    const container=document.getElementById("timers");
    const afterElement=getDragAfterElement(container,e.clientY);
    if(afterElement==null){
        container.appendChild(dragging);
    }else{
        container.insertBefore(dragging,afterElement);
    }
});

function getDragAfterElement(container,y){
    const elements=[...container.querySelectorAll(".timer-row:not(.dragging)")];
    return elements.reduce((closest,child)=>{
        const box=child.getBoundingClientRect();
        const offset=y-box.top-box.height/2;
        if(offset<0&&offset>closest.offset){
            return{offset:offset,element:child};
        }else{
            return closest;
        }
    },{offset:Number.NEGATIVE_INFINITY}).element;
}

// -------- TIMER --------
function startTimer(){
    unlockAudio();

    timers=[];
    document.querySelectorAll(".timer-row").forEach(row=>{
        const label=row.children[1].value.trim();
        const seconds=parseInt(row.children[2].value);
        if(!isNaN(seconds)&&seconds>0){
            timers.push({label,seconds});
        }
    });

    if(!timers.length)return;

    if(!paused){
        currentIndex=0;
        remaining=timers[0].seconds;
    }

    paused=false;
    runTimer();
}

function pauseTimer(){
    paused=true;
    clearInterval(interval);
}

function runTimer(){
    if(currentIndex>=timers.length)return;

    const labelText=timers[currentIndex].label;
    const labelLower=labelText.toLowerCase();
    const labelDiv=document.getElementById("segmentLabel");
    const displayDiv=document.getElementById("display");

    labelDiv.textContent=labelText;

    function applyColor(){
        if(labelLower.includes("run")){
            labelDiv.style.color="red";
            displayDiv.style.color="red";
        }else if(labelLower.includes("walk")){
            labelDiv.style.color="lime";
            displayDiv.style.color="lime";
        }else{
            labelDiv.style.color="white";
            displayDiv.style.color="white";
        }
    }

    applyColor();
    updateDisplay();
    clearInterval(interval);

    interval=setInterval(()=>{

        if(paused)return;

        remaining--;
        updateDisplay();

        if(remaining===3||remaining===2||remaining===1){
            beep(1000,120);
        }

        if(remaining===0){

            beep(250,400);

            if(navigator.vibrate){
                navigator.vibrate([200,100,200]);
            }

            clearInterval(interval);
            currentIndex++;

            if(currentIndex<timers.length){
                remaining=timers[currentIndex].seconds;
                setTimeout(runTimer,1000);
            }
        }

    },1000);
}

function updateDisplay(){
    const m=Math.floor(remaining/60);
    const s=remaining%60;
    document.getElementById("display").textContent=
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// Add default two segments
addTimer("Run",30);
addTimer("Walk",30);

</script>

</body>
</html>
