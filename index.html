<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HIIT Timer</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
padding:20px;
}

h1{
margin-bottom:10px;
}

#timer{
font-size:72px;
margin:20px 0;
}

#segmentLabel{
font-size:37px;
font-weight:bold;
margin-bottom:20px;
}

button{
font-size:18px;
padding:10px 16px;
margin:4px;
border:none;
border-radius:6px;
}

input,select{
font-size:16px;
padding:6px;
margin:4px;
}

#segments{
margin-top:20px;
}

.segment{
display:flex;
justify-content:space-between;
align-items:center;
background:#222;
padding:10px;
margin:6px 0;
border-radius:6px;
}

.segment span{
cursor:pointer;
}

.drag{
cursor:grab;
margin-right:8px;
}

</style>
</head>

<body>

<h1>HIIT Timer</h1>

<div id="segmentLabel">Ready</div>

<div id="timer">0</div>

<button onclick="startWorkout()">Start</button>
<button onclick="stopWorkout()">Stop</button>

<br><br>

<label>Beep Volume</label>
<input type="range" id="volume" min="0" max="1" step="0.05" value="0.5">

<hr>

<h3>Add Segment</h3>

<input id="segName" placeholder="Run / Walk">
<input id="segTime" type="number" placeholder="Seconds">

<button onclick="addSegment()">Add</button>

<hr>

<button onclick="newProgram()">New Program</button>

<input id="programName" placeholder="Program name">

<button onclick="saveProgram()">Save</button>

<button onclick="loadProgram()">Load</button>

<select id="programList"></select>

<hr>

<div id="segments"></div>

<script>

let segments=[]
let timer=null
let currentSeg=0
let remaining=0
let audioCtx=null

function enableAudio(){

if(!audioCtx){

audioCtx=new (window.AudioContext||window.webkitAudioContext)()

}

}

function beep(freq=900,duration=0.15){

if(!audioCtx)return

let vol=document.getElementById("volume").value

let osc=audioCtx.createOscillator()
let gain=audioCtx.createGain()

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.frequency.value=freq
gain.gain.value=vol

osc.start()

setTimeout(()=>{

osc.stop()

},duration*1000)

}

function tripleBeep(){

beep(1000,0.1)

setTimeout(()=>beep(1000,0.1),120)

setTimeout(()=>beep(1000,0.1),240)

}

function updateSegments(){

let container=document.getElementById("segments")
container.innerHTML=""

segments.forEach((s,i)=>{

let div=document.createElement("div")
div.className="segment"
div.draggable=true

div.ondragstart=(e)=>{

e.dataTransfer.setData("index",i)

}

div.ondragover=(e)=>{

e.preventDefault()

}

div.ondrop=(e)=>{

let from=e.dataTransfer.getData("index")

let temp=segments[from]

segments.splice(from,1)

segments.splice(i,0,temp)

updateSegments()

}

let drag=document.createElement("span")
drag.className="drag"
drag.innerText="☰"

let label=document.createElement("span")

label.innerText=s.name+" ("+s.time+"s)"

let name=s.name.toLowerCase()

label.style.fontWeight="bold"
label.style.fontSize="20px"

if(name.includes("run")) label.style.color="red"
else if(name.includes("walk")) label.style.color="limegreen"
else label.style.color="white"

label.onclick=()=>editSegment(i)

let del=document.createElement("button")
del.innerText="Delete"

del.onclick=()=>{

if(confirm("Delete segment?")){

segments.splice(i,1)

updateSegments()

}

}

div.appendChild(drag)
div.appendChild(label)
div.appendChild(del)

container.appendChild(div)

})

}

function addSegment(){

let name=document.getElementById("segName").value
let time=parseInt(document.getElementById("segTime").value)

if(!name||!time)return

segments.push({name,time})

document.getElementById("segName").value=""
document.getElementById("segTime").value=""

updateSegments()

}

function editSegment(i){

let s=segments[i]

let newName=prompt("Segment name",s.name)
if(newName===null)return

let newTime=prompt("Seconds",s.time)
if(newTime===null)return

segments[i].name=newName
segments[i].time=parseInt(newTime)

updateSegments()

}

function startWorkout(){

enableAudio()

if(segments.length===0)return

currentSeg=0

runSegment()

}

function stopWorkout(){

clearInterval(timer)

document.getElementById("timer").innerText="0"
document.getElementById("segmentLabel").innerText="Stopped"

}

function runSegment(){

if(currentSeg>=segments.length){

document.getElementById("segmentLabel").innerText="Done"

return

}

let seg=segments[currentSeg]

remaining=seg.time

let label=document.getElementById("segmentLabel")

label.innerText=seg.name

label.style.fontWeight="bold"
label.style.fontSize="37px"

let name=seg.name.toLowerCase()

if(name.includes("run")) label.style.color="red"
else if(name.includes("walk")) label.style.color="limegreen"
else label.style.color="white"

timer=setInterval(()=>{

document.getElementById("timer").innerText=remaining

if(remaining===3)beep(850)
if(remaining===2)beep(850)
if(remaining===1)beep(850)

if(remaining===0){

clearInterval(timer)

tripleBeep()

currentSeg++

setTimeout(runSegment,400)

}

remaining--

},1000)

}

function saveProgram(){

let name=document.getElementById("programName").value

if(!name)return

localStorage.setItem("hiit_"+name,JSON.stringify(segments))

updateProgramList()

}

function loadProgram(){

let select=document.getElementById("programList")

let name=select.value

if(!name)return

let data=localStorage.getItem("hiit_"+name)

segments=JSON.parse(data)||[]

updateSegments()

}

function updateProgramList(){

let select=document.getElementById("programList")

select.innerHTML=""

for(let key in localStorage){

if(key.startsWith("hiit_")){

let name=key.replace("hiit_","")

let opt=document.createElement("option")

opt.value=name
opt.innerText=name

select.appendChild(opt)

}

}

}

function newProgram(){

if(confirm("Start a new program?")){

segments=[]

updateSegments()

document.getElementById("segmentLabel").innerText="Ready"

document.getElementById("timer").innerText="0"

}

}

updateProgramList()

</script>

</body>
</html>
