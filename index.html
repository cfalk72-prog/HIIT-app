<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HIIT Timer</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:10px;
}

#timer{
font-size:80px;
margin:20px;
}

#segmentLabel{
font-size:24px;
margin-bottom:10px;
}

button{
font-size:18px;
padding:10px 20px;
margin:5px;
border:none;
border-radius:6px;
}

.start{background:#2ecc71;color:white}
.stop{background:#e74c3c;color:white}
.add{background:#3498db;color:white}

.segment{
display:flex;
justify-content:space-between;
align-items:center;
background:#222;
margin:5px;
padding:10px;
border-radius:6px;
}

.segment input{
width:70px;
font-size:16px;
}

.drag{
cursor:grab;
margin-right:10px;
}

</style>
</head>

<body>

<h1>HIIT Timer</h1>

<div id="segmentLabel">Ready</div>
<div id="timer">00:00</div>

<button class="start" onclick="startTimer()">Start</button>
<button class="stop" onclick="stopTimer()">Stop</button>
<button class="add" onclick="addSegment()">Add Segment</button>
<button onclick="saveProgram()">Save</button>
<button onclick="loadProgram()">Load</button>

<div id="segments"></div>

<script>

let segments=[]
let currentSegment=0
let timeRemaining=0
let timerInterval=null

let audioCtx=null

function unlockAudio(){

if(!audioCtx){
audioCtx=new (window.AudioContext||window.webkitAudioContext)()
}

}

document.body.addEventListener("touchstart",unlockAudio,{once:true})
document.body.addEventListener("click",unlockAudio,{once:true})

function playBeep(freq=1200,duration=120){

if(!audioCtx)return

let osc=audioCtx.createOscillator()
let gain=audioCtx.createGain()

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.frequency.value=freq
osc.type="square"

gain.gain.value=0.4

osc.start()

setTimeout(()=>{osc.stop()},duration)

}

function playTripleBeep(){

playBeep(600)
setTimeout(()=>playBeep(600),150)
setTimeout(()=>playBeep(600),300)

}

function startTimer(){

if(segments.length===0)return

currentSegment=0
runSegment()

}

function runSegment(){

let seg=segments[currentSegment]

timeRemaining=seg.time

updateDisplay()

document.getElementById("segmentLabel").innerText=seg.name

timerInterval=setInterval(()=>{

timeRemaining--

updateDisplay()

if(timeRemaining<=3 && timeRemaining>0){
playBeep(1500)
}

if(timeRemaining===0){

playTripleBeep()

clearInterval(timerInterval)

currentSegment++

if(currentSegment<segments.length){
setTimeout(runSegment,500)
}else{
document.getElementById("segmentLabel").innerText="Finished"
}

}

},1000)

}

function stopTimer(){

clearInterval(timerInterval)

}

function updateDisplay(){

let m=Math.floor(timeRemaining/60)
let s=timeRemaining%60

document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")

}

function addSegment(){

let name=prompt("Segment name")
if(!name)return

let seconds=parseInt(prompt("Seconds"))

segments.push({name:name,time:seconds})

renderSegments()

}

function deleteSegment(i){

if(!confirm("Delete segment?"))return

segments.splice(i,1)

renderSegments()

}

function renderSegments(){

let list=document.getElementById("segments")
list.innerHTML=""

segments.forEach((seg,i)=>{

let div=document.createElement("div")
div.className="segment"
div.draggable=true

div.innerHTML=`
<span class="drag">☰</span>
${seg.name} - ${seg.time}s
<button onclick="deleteSegment(${i})">Delete</button>
`

div.addEventListener("dragstart",e=>{
e.dataTransfer.setData("index",i)
})

div.addEventListener("dragover",e=>{
e.preventDefault()
})

div.addEventListener("drop",e=>{

let from=e.dataTransfer.getData("index")

let temp=segments[from]

segments.splice(from,1)
segments.splice(i,0,temp)

renderSegments()

})

list.appendChild(div)

})

}

function saveProgram(){

localStorage.setItem("hiitSegments",JSON.stringify(segments))

alert("Saved")

}

function loadProgram(){

let data=localStorage.getItem("hiitSegments")

if(data){
segments=JSON.parse(data)
renderSegments()
}

}

</script>

</body>
</html>
