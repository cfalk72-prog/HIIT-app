<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HIIT Timer</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

h1{margin-top:10px;}

#timer{
font-size:90px;
margin:20px;
}

#segmentLabel{
font-size:26px;
margin-bottom:10px;
}

button{
font-size:18px;
padding:10px 18px;
margin:5px;
border:none;
border-radius:6px;
}

.start{background:#2ecc71;color:white}
.stop{background:#e74c3c;color:white}
.add{background:#3498db;color:white}

.segment{
display:flex;
justify-content:space-between;
align-items:center;
background:#222;
margin:6px;
padding:10px;
border-radius:6px;
}

.drag{
cursor:grab;
margin-right:8px;
}

</style>
</head>

<body>

<h1>HIIT Timer</h1>

<div id="segmentLabel">Ready</div>
<div id="timer">00:00</div>

<button class="start" onclick="startTimer()">Start</button>
<button class="stop" onclick="stopTimer()">Stop</button>
<button class="add" onclick="addSegment()">Add Segment</button>
<button onclick="saveProgram()">Save Program</button>
<button onclick="loadProgram()">Load Program</button>

<div id="segments"></div>

<script>

let segments=[]
let currentSegment=0
let timeRemaining=0
let timerInterval=null

let audioCtx=null

function initAudio(){

if(!audioCtx){
audioCtx=new(window.AudioContext||window.webkitAudioContext)()
}

if(audioCtx.state==="suspended"){
audioCtx.resume()
}

}

function playBeep(freq=1400,duration=120){

if(!audioCtx)return

const osc=audioCtx.createOscillator()
const gain=audioCtx.createGain()

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.frequency.value=freq
osc.type="square"

gain.gain.setValueAtTime(.5,audioCtx.currentTime)

osc.start()
osc.stop(audioCtx.currentTime+duration/1000)

}

function playTripleBeep(){

playBeep(600)
setTimeout(()=>playBeep(600),150)
setTimeout(()=>playBeep(600),300)

}

function startTimer(){

initAudio()

if(segments.length===0)return

currentSegment=0
runSegment()

}

function runSegment(){

let seg=segments[currentSegment]

timeRemaining=seg.time

document.getElementById("segmentLabel").innerText=seg.name

updateDisplay()

timerInterval=setInterval(()=>{

timeRemaining--

updateDisplay()

if(timeRemaining<=3 && timeRemaining>0){
playBeep(1600)
}

if(timeRemaining===0){

playTripleBeep()

clearInterval(timerInterval)

currentSegment++

if(currentSegment<segments.length){
setTimeout(runSegment,400)
}else{
document.getElementById("segmentLabel").innerText="Finished"
}

}

},1000)

}

function stopTimer(){

clearInterval(timerInterval)

}

function updateDisplay(){

let m=Math.floor(timeRemaining/60)
let s=timeRemaining%60

document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")

}

function addSegment(){

let name=prompt("Segment name")
if(!name)return

let seconds=parseInt(prompt("Seconds"))

segments.push({name:name,time:seconds})

renderSegments()

}

function deleteSegment(i){

if(!confirm("Delete segment?"))return

segments.splice(i,1)

renderSegments()

}

function renderSegments(){

let list=document.getElementById("segments")
list.innerHTML=""

segments.forEach((seg,i)=>{

let div=document.createElement("div")
div.className="segment"
div.draggable=true

div.innerHTML=`
<span class="drag">☰</span>
${seg.name} - ${seg.time}s
<button onclick="deleteSegment(${i})">Delete</button>
`

div.addEventListener("dragstart",e=>{
e.dataTransfer.setData("index",i)
})

div.addEventListener("dragover",e=>{
e.preventDefault()
})

div.addEventListener("drop",e=>{

let from=e.dataTransfer.getData("index")

let temp=segments[from]

segments.splice(from,1)
segments.splice(i,0,temp)

renderSegments()

})

list.appendChild(div)

})

}

function saveProgram(){

let name=prompt("Program name")

if(!name)return

let programs=JSON.parse(localStorage.getItem("hiitPrograms")||"{}")

programs[name]=segments

localStorage.setItem("hiitPrograms",JSON.stringify(programs))

alert("Program saved")

}

function loadProgram(){

let programs=JSON.parse(localStorage.getItem("hiitPrograms")||"{}")

let names=Object.keys(programs)

if(names.length===0){
alert("No saved programs")
return
}

let name=prompt("Available:\n"+names.join("\n")+"\n\nType program name")

if(!programs[name])return

segments=programs[name]

renderSegments()

}

</script>

</body>
</html>
