<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIIT Timer</title>

<style>

body{
font-family: Arial, sans-serif;
background:#111;
color:white;
text-align:center;
padding:30px;
}

h1{
font-size:40px;
}

.timer{
font-size:80px;
margin:30px 0;
}

.controls{
margin:20px;
}

button{
padding:15px 25px;
margin:5px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.start{background:#27ae60;color:white;}
.pause{background:#f39c12;color:white;}
.reset{background:#e74c3c;color:white;}

input{
padding:10px;
font-size:16px;
width:80px;
margin:5px;
text-align:center;
}

.phase{
font-size:28px;
margin-top:10px;
}

.round{
font-size:22px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>HIIT Timer</h1>

<div>

Work (sec)
<input id="workTime" value="30">

Rest (sec)
<input id="restTime" value="15">

Rounds
<input id="rounds" value="8">

</div>

<div class="timer" id="timer">00:30</div>

<div class="phase" id="phase">READY</div>

<div class="round" id="roundDisplay">Round 0 / 8</div>

<div class="controls">

<button class="start" onclick="startTimer()">Start</button>

<button class="pause" onclick="pauseTimer()">Pause</button>

<button class="reset" onclick="resetTimer()">Reset</button>

</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

let timer;
let timeLeft;
let work;
let rest;
let rounds;
let currentRound = 1;
let isWork = true;
let running = false;

function updateDisplay(){
let min = Math.floor(timeLeft/60);
let sec = timeLeft%60;

document.getElementById("timer").innerText =
String(min).padStart(2,'0') + ":" +
String(sec).padStart(2,'0');

document.getElementById("roundDisplay").innerText =
"Round " + currentRound + " / " + rounds;

document.getElementById("phase").innerText =
isWork ? "WORK" : "REST";
}

function startTimer(){

if(running) return;

work = parseInt(document.getElementById("workTime").value);
rest = parseInt(document.getElementById("restTime").value);
rounds = parseInt(document.getElementById("rounds").value);

if(!timeLeft){
timeLeft = work;
}

running = true;

timer = setInterval(()=>{

timeLeft--;

updateDisplay();

if(timeLeft <= 0){

document.getElementById("beep").play();

if(isWork){

isWork = false;
timeLeft = rest;

}else{

if(currentRound >= rounds){

clearInterval(timer);
running=false;
document.getElementById("phase").innerText = "DONE";
return;

}

currentRound++;
isWork = true;
timeLeft = work;

}

}

},1000);

}

function pauseTimer(){

clearInterval(timer);
running=false;

}

function resetTimer(){

clearInterval(timer);

running=false;

currentRound = 1;
isWork = true;

work = parseInt(document.getElementById("workTime").value);

timeLeft = work;

updateDisplay();

document.getElementById("phase").innerText = "READY";

}

window.onload = () => {

work = parseInt(document.getElementById("workTime").value);

timeLeft = work;

updateDisplay();

};

</script>

</body>
</html>
