<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIIT Pro</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
body { margin:0; background:black; color:white; font-family:-apple-system,BlinkMacSystemFont,sans-serif; text-align:center; padding:20px; }
#segmentLabel { font-size:32px; margin-top:20px; }
#display { font-size:90px; margin:10px 0 20px 0; }
.timer-row { background:#111; padding:10px; margin:6px 0; border-radius:10px; display:flex; gap:6px; align-items:center; }
.timer-row input { flex:1; padding:6px; font-size:16px; }
.timer-row button { padding:4px 10px; font-size:14px; border-radius:8px; border:none; background:#a00; color:white; }
button { font-size:16px; padding:8px 16px; margin:6px; border-radius:12px; border:none; background:#1c1c1e; color:white; }
</style>
</head>
<body>

<h2>HIIT Programs</h2>
<select id="programSelect"></select>
<button onclick="loadProgram()">Load</button><br><br>
<input id="programName" placeholder="Program Name">
<button onclick="createProgram()">New Program</button>

<div id="timerContainer"></div>

<button onclick="addTimer()">Add Segment</button>
<button onclick="saveProgram()">Save Program</button>

<hr>
<div id="segmentLabel"></div>
<div id="display">00:00</div>

<button id="enableBtn">Enable Sounds / Start Workout</button>
<button onclick="pauseTimer()">Pause</button>

<!-- Embedded Audio -->
<audio id="shortBeep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
<audio id="longBeep" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" preload="auto"></audio>

<script>
// ---------- PROGRAM DATA ----------
let programs = JSON.parse(localStorage.getItem("hiitPrograms")) || {};
let currentProgram = null;
let timers = [];
let currentIndex = 0;
let remaining = 0;
let interval = null;
let paused = false;
let audioUnlocked = false;

// ---------- AUDIO ----------
function unlockAudio() {
    // Play silently to unlock iOS audio
    document.getElementById('shortBeep').play().catch(()=>{});
    document.getElementById('longBeep').play().catch(()=>{});
    if(navigator.vibrate) navigator.vibrate(1);
    audioUnlocked = true;
}

// ---------- UI ----------
function refreshProgramDropdown() {
    const sel=document.getElementById("programSelect");
    sel.innerHTML="";
    for(let name in programs){
        const opt=document.createElement("option");
        opt.value=name; opt.textContent=name; sel.appendChild(opt);
    }
}

function createProgram(){
    const name=document.getElementById("programName").value.trim();
    if(!name) return;
    programs[name]=[];
    localStorage.setItem("hiitPrograms",JSON.stringify(programs));
    refreshProgramDropdown();
}

function loadProgram(){
    const name=document.getElementById("programSelect").value;
    programs=JSON.parse(localStorage.getItem("hiitPrograms"))||{};
    currentProgram=name;
    timers=programs[name]? [...programs[name]]:[];
    renderTimers();
}

function addTimer(label="",seconds=""){
    const container=document.getElementById("timerContainer");
    const div=document.createElement("div");
    div.className="timer-row";
    div.innerHTML=`
        <input type="text" placeholder="Run / Walk / etc" value="${label}">
        <input type="number" placeholder="Seconds" value="${seconds}">
        <button onclick="deleteTimer(this)">Delete</button>
    `;
    container.appendChild(div);
    initSortable();
}

function renderTimers(){
    const container=document.getElementById("timerContainer");
    container.innerHTML="";
    timers.forEach(t=>addTimer(t.label,t.seconds));
    initSortable();
}

function saveProgram(){
    if(!currentProgram) return;
    const newTimers=[];
    document.querySelectorAll(".timer-row").forEach(row=>{
        const label=row.children[0].value.trim();
        const seconds=parseInt(row.children[1].value);
        if(!isNaN(seconds)&&seconds>0) newTimers.push({label,seconds});
    });
    programs[currentProgram]=newTimers;
    timers=[...newTimers];
    localStorage.setItem("hiitPrograms",JSON.stringify(programs));
    alert("Saved!");
}

function deleteTimer(btn){
    if(confirm("Delete this segment?")){
        const row=btn.parentElement;
        const idx=Array.from(document.getElementById("timerContainer").children).indexOf(row);
        row.remove();
        timers.splice(idx,1);
    }
}

// ---------- TIMER ----------
function startTimer(){
    if(!audioUnlocked){ unlockAudio(); document.getElementById("enableBtn").style.display="none"; }
    if(!timers.length) return;
    if(!paused){ currentIndex=0; remaining=timers[0].seconds; }
    paused=false;
    runTimer();
}

function pauseTimer(){ paused=true; clearInterval(interval); }

function runTimer(){
    if(currentIndex>=timers.length) return;
    const labelDiv=document.getElementById("segmentLabel");
    const displayDiv=document.getElementById("display");
    const lbl=timers[currentIndex].label.toLowerCase();
    labelDiv.textContent=timers[currentIndex].label||"";
    displayDiv.style.color=lbl.includes("run")?"red":lbl.includes("walk")?"lime":"white";
    updateDisplay();
    clearInterval(interval);
    interval=setInterval(()=>{
        if(paused) return;
        remaining--;
        updateDisplay();
        if(remaining<=3 && remaining>0) document.getElementById('shortBeep').play();
        if(remaining<=0){
            clearInterval(interval);
            document.getElementById('longBeep').play();
            if(navigator.vibrate) navigator.vibrate([200,100,200]);
            currentIndex++;
            if(currentIndex<timers.length){ remaining=timers[currentIndex].seconds; setTimeout(runTimer,1000); }
        }
    },1000);
}

function updateDisplay(){
    const m=Math.floor(remaining/60), s=remaining%60;
    document.getElementById("display").textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ---------- DRAG-AND-DROP ----------
function initSortable(){
    const container=document.getElementById("timerContainer");
    if(container._sortable) return; // already initialized
    container._sortable = new Sortable(container,{
        animation:150,
        onEnd:function(evt){
            const moved=timers.splice(evt.oldIndex,1)[0];
            timers.splice(evt.newIndex,0,moved);
        }
    });
}

// ---------- INITIAL SETUP ----------
refreshProgramDropdown();
document.getElementById("enableBtn").addEventListener("click",startTimer);
</script>

</body>
</html>
