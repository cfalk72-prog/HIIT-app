<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HIIT Timer</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

h1{margin-top:10px;}

#timer{
font-size:90px;
margin:20px;
}

#segmentLabel{
font-size:50px;
margin-bottom:10px;
font-weight:bold;
}

#nextSegment{
font-size:24px;
margin-bottom:10px;
color:#aaa;
}

button{
font-size:18px;
padding:10px 18px;
margin:5px;
border:none;
border-radius:6px;
}

.start{background:#2ecc71;color:white}
.stop{background:#e74c3c;color:white}
.add{background:#3498db;color:white}

.segment{
display:flex;
justify-content:space-between;
align-items:center;
background:#222;
margin:6px;
padding:10px;
border-radius:6px;
}

.drag{
cursor:grab;
margin-right:8px;
}

#volumeControl{
margin-top:10px;
}

select{
font-size:18px;
padding:6px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>HIIT Timer</h1>

<div id="segmentLabel">Ready</div>
<div id="nextSegment"></div>
<div id="timer">00:00</div>

<button class="start" onclick="startTimer()">Start</button>
<button class="stop" onclick="stopTimer()">Stop</button>
<button class="add" onclick="addSegment()">Add Segment</button>

<br>

<select id="programSelect"></select>

<br>

<button onclick="saveProgram()">Save Program</button>
<button onclick="loadProgram()">Load Program</button>
<button onclick="newProgram()">New Program</button>
<button onclick="deleteProgram()">Delete Program</button>

<div id="volumeControl">
Beep Volume<br>
<input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.5">
</div>

<div id="segments"></div>

<script>

let segments=[]
let currentSegment=0
let timeRemaining=0
let timerInterval=null

let audioCtx=null
let beepVolume=0.5

document.getElementById("volumeSlider").addEventListener("input",e=>{
beepVolume=parseFloat(e.target.value)
})

function refreshProgramDropdown(){

let programs=JSON.parse(localStorage.getItem("hiitPrograms")||"{}")

let select=document.getElementById("programSelect")

select.innerHTML=""

Object.keys(programs).forEach(name=>{

let option=document.createElement("option")
option.value=name
option.textContent=name

select.appendChild(option)

})

}

function initAudio(){

if(!audioCtx){
audioCtx=new(window.AudioContext||window.webkitAudioContext)()
}

if(audioCtx.state==="suspended"){
audioCtx.resume()
}

}

function playBeep(freq=1400,duration=120){

if(!audioCtx)return

const osc=audioCtx.createOscillator()
const gain=audioCtx.createGain()

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.frequency.value=freq
osc.type="square"

gain.gain.setValueAtTime(beepVolume,audioCtx.currentTime)

osc.start()
osc.stop(audioCtx.currentTime+duration/1000)

}

function playTripleBeep(){

playBeep(600)
setTimeout(()=>playBeep(600),150)
setTimeout(()=>playBeep(600),300)

}

function startTimer(){

initAudio()

if(segments.length===0)return

currentSegment=0
runSegment()

}

function runSegment(){

let seg=segments[currentSegment]

timeRemaining=seg.time

let label=document.getElementById("segmentLabel")

label.innerText=seg.name

let name=seg.name.toLowerCase()

if(name.includes("run")){
label.style.color="red"
}else if(name.includes("walk")){
label.style.color="limegreen"
}else{
label.style.color="white"
}

let next=segments[currentSegment+1]

if(next){
document.getElementById("nextSegment").innerText="Up Next: "+next.name
}else{
document.getElementById("nextSegment").innerText=""
}

updateDisplay()

timerInterval=setInterval(()=>{

timeRemaining--

updateDisplay()

if(timeRemaining<=3 && timeRemaining>0){
playBeep(1600)
}

if(timeRemaining===0){

playTripleBeep()

clearInterval(timerInterval)

currentSegment++

if(currentSegment<segments.length){
setTimeout(runSegment,400)
}else{
label.innerText="Finished"
label.style.color="white"
document.getElementById("nextSegment").innerText=""
}

}

},1000)

}

function stopTimer(){

clearInterval(timerInterval)

}

function updateDisplay(){

let m=Math.floor(timeRemaining/60)
let s=timeRemaining%60

document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")

}

function addSegment(){

let name=prompt("Segment name")
if(!name)return

let seconds=parseInt(prompt("Seconds"))

segments.push({name:name,time:seconds})

renderSegments()

}

function deleteSegment(i){

if(!confirm("Delete segment?"))return

segments.splice(i,1)

renderSegments()

}

function moveUp(i){

if(i===0)return

let temp=segments[i]
segments[i]=segments[i-1]
segments[i-1]=temp

renderSegments()

}

function moveDown(i){

if(i===segments.length-1)return

let temp=segments[i]
segments[i]=segments[i+1]
segments[i+1]=temp

renderSegments()

}

function renderSegments(){

let list=document.getElementById("segments")
list.innerHTML=""

segments.forEach((seg,i)=>{

let div=document.createElement("div")
div.className="segment"

div.innerHTML=`
${seg.name} - ${seg.time}s
<div>
<button onclick="moveUp(${i})">⬆</button>
<button onclick="moveDown(${i})">⬇</button>
<button onclick="deleteSegment(${i})">Delete</button>
</div>
`

list.appendChild(div)

})

}

function saveProgram(){

let name=document.getElementById("programSelect").value

if(!name){
name=prompt("Program name")
if(!name)return
}

let programs=JSON.parse(localStorage.getItem("hiitPrograms")||"{}")

programs[name]=segments

localStorage.setItem("hiitPrograms",JSON.stringify(programs))

refreshProgramDropdown()

alert("Program saved")

}

function loadProgram(){

let name=document.getElementById("programSelect").value

if(!name)return

let programs=JSON.parse(localStorage.getItem("hiitPrograms")||"{}")

segments=programs[name]||[]

renderSegments()

}

function newProgram(){

let name=prompt("Name of the new program")

if(!name)return

let programs=JSON.parse(localStorage.getItem("hiitPrograms")||"{}")

programs[name]=[]

localStorage.setItem("hiitPrograms",JSON.stringify(programs))

refreshProgramDropdown()

document.getElementById("programSelect").value=name

segments=[]

renderSegments()

document.getElementById("segmentLabel").innerText="Ready"
document.getElementById("timer").innerText="00:00"
document.getElementById("nextSegment").innerText=""

}

function deleteProgram(){

let name=document.getElementById("programSelect").value

if(!name)return

if(!confirm("Delete program '"+name+"'?"))return

let programs=JSON.parse(localStorage.getItem("hiitPrograms")||"{}")

delete programs[name]

localStorage.setItem("hiitPrograms",JSON.stringify(programs))

refreshProgramDropdown()

segments=[]
renderSegments()

document.getElementById("segmentLabel").innerText="Ready"
document.getElementById("timer").innerText="00:00"
document.getElementById("nextSegment").innerText=""

}

refreshProgramDropdown()

</script>

</body>
</html>
