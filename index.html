<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>HIIT Pro</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    text-align: center;
    padding: 20px;
}

#segmentLabel {
    font-size: 32px;
    margin-top: 20px;
}

#display {
    font-size: 90px;
    margin: 10px 0 20px 0;
}

.timer-row {
    background: #111;
    padding: 10px;
    margin: 6px 0;
    border-radius: 10px;
    display: flex;
    gap: 6px;
    align-items: center;
    touch-action: none;
    user-select: none;
}

.timer-row.dragging {
    opacity: 0.5;
}

input {
    flex: 1;
    padding: 6px;
    font-size: 16px;
}

button {
    font-size: 16px;
    padding: 8px 16px;
    margin: 6px;
    border-radius: 12px;
    border: none;
    background: #1c1c1e;
    color: white;
}
</style>
</head>

<body>

<h2>HIIT Programs</h2>

<select id="programSelect"></select>
<button onclick="loadProgram()">Load</button>
<br><br>

<input id="programName" placeholder="Program Name">
<button onclick="createProgram()">New Program</button>

<div id="timerContainer"></div>

<button onclick="addTimer()">Add Segment</button>
<button onclick="saveProgram()">Save Program</button>

<hr>

<div id="segmentLabel"></div>
<div id="display">00:00</div>

<button id="startBtn" onclick="start()">Start</button>
<button id="pauseBtn" onclick="pause()">Pause</button>

<script>
// ---------------------
// PROGRAM DATA
// ---------------------
let programs = JSON.parse(localStorage.getItem("hiitPrograms")) || {};
let currentProgram = null;
let timers = [];
let currentIndex = 0;
let remaining = 0;
let interval = null;
let paused = false;

// ---------------------
// AUDIO SETUP
// ---------------------
let audioCtx;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function shortBeep() {
    initAudio();
    const osc = audioCtx.createOscillator();
    osc.frequency.value = 1000;
    osc.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

function longBeep() {
    initAudio();
    const osc = audioCtx.createOscillator();
    osc.frequency.value = 600;
    osc.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.8);
}

function vibrate() {
    if (navigator.vibrate) navigator.vibrate([200,100,200]);
}

// ---------------------
// UI / PROGRAM FUNCTIONS
// ---------------------
function refreshProgramDropdown() {
    const select = document.getElementById("programSelect");
    select.innerHTML = "";
    for (let name in programs) {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
    }
}

function createProgram() {
    const name = document.getElementById("programName").value.trim();
    if (!name) return;
    programs[name] = [];
    localStorage.setItem("hiitPrograms", JSON.stringify(programs));
    refreshProgramDropdown();
}

function loadProgram() {
    const name = document.getElementById("programSelect").value;
    programs = JSON.parse(localStorage.getItem("hiitPrograms")) || {};
    currentProgram = name;
    timers = programs[name] ? [...programs[name]] : [];
    renderTimers();
}

function addTimer(label = "", seconds = "") {
    const container = document.getElementById("timerContainer");
    const div = document.createElement("div");
    div.className = "timer-row";
    div.innerHTML = `
        <input type="text" placeholder="Run / Walk / etc" value="${label}">
        <input type="number" placeholder="Seconds" value="${seconds}">
    `;
    enableDragAndSwipe(div);
    container.appendChild(div);
}

function renderTimers() {
    document.getElementById("timerContainer").innerHTML = "";
    timers.forEach(t => addTimer(t.label, t.seconds));
}

function saveProgram() {
    if (!currentProgram) return;
    const newTimers = [];
    document.querySelectorAll(".timer-row").forEach(row => {
        const label = row.children[0].value.trim();
        const seconds = parseInt(row.children[1].value);
        if (!isNaN(seconds) && seconds > 0) newTimers.push({ label, seconds });
    });
    programs[currentProgram] = newTimers;
    timers = [...newTimers];
    localStorage.setItem("hiitPrograms", JSON.stringify(programs));
    alert("Saved!");
}

// ---------------------
// TIMER LOGIC
// ---------------------
function start() {
    if (!timers.length) return;
    if (!paused) {
        currentIndex = 0;
        remaining = timers[0].seconds;
    }
    paused = false;
    runTimer();
}

function pause() {
    paused = true;
    clearInterval(interval);
}

function runTimer() {
    const labelDiv = document.getElementById("segmentLabel");
    labelDiv.textContent = timers[currentIndex].label || "";
    const label = timers[currentIndex].label.toLowerCase();
    if (label.includes("run")) labelDiv.style.color = "red";
    else if (label.includes("walk")) labelDiv.style.color = "lime";
    else labelDiv.style.color = "white";

    updateDisplay();

    clearInterval(interval);
    interval = setInterval(() => {
        if (paused) return;

        remaining--;
        updateDisplay();

        if (remaining <= 3 && remaining > 0) shortBeep();

        if (remaining <= 0) {
            clearInterval(interval);
            longBeep();
            vibrate();
            currentIndex++;
            if (currentIndex < timers.length) {
                remaining = timers[currentIndex].seconds;
                setTimeout(runTimer, 1000);
            }
        }
    }, 1000);
}

function updateDisplay() {
    const mins = Math.floor(remaining / 60);
    const secs = remaining % 60;
    document.getElementById("display").textContent =
        `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
}

// ---------------------
// DRAG & SWIPE
// ---------------------
function enableDragAndSwipe(row) {
    let startY, currentY, moving = false;

    // Drag
    row.addEventListener('touchstart', e => {
        startY = e.touches[0].clientY;
        row.classList.add('dragging');
    });

    row.addEventListener('touchmove', e => {
        currentY = e.touches[0].clientY;
        moving = true;
        row.style.transform = `translateY(${currentY - startY}px)`;
    });

    row.addEventListener('touchend', e => {
        row.classList.remove('dragging');
        row.style.transform = '';
        if (!moving) return;

        const container = document.getElementById("timerContainer");
        const rows = Array.from(container.children);
        const index = rows.indexOf(row);
        let newIndex = index;
        for (let i=0;i<rows.length;i++){
            if (rows[i]!==row && rows[i].getBoundingClientRect().top + rows[i].offsetHeight/2 > row.getBoundingClientRect().top) {
                newIndex = i;
                break;
            }
        }
        container.insertBefore(row, container.children[newIndex]);
        moving = false;
    });

    // Swipe to delete
    let startX;
    row.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
    row.addEventListener('touchend', e => {
        const endX = e.changedTouches[0].clientX;
        if (Math.abs(endX - startX) > 100) { // swipe threshold
            row.remove();
        }
    });
}

// ---------------------
// INITIAL SETUP
// ---------------------
refreshProgramDropdown();
</script>
</body>
</html>
